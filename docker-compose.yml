version: "3.9"

services:

  bot:
    build: .
    container_name: filter_trade_bot
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: always

  api:
    build: .
    container_name: filter_trade_api
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: always